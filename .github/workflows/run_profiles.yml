name: Run Profiles fetch script
on:
  workflow_dispatch:
  schedule:
    - cron:  "25 * * * *"
jobs:
  run:
    runs-on: ubuntu-latest
    environment: 'FranceX2'
    permissions:
      contents: read
      packages: read
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Write SERVICE_ACCOUNT_CREDENTIAL to service_account_key.json
        run: |
          echo "${{ secrets.SERVICE_ACCOUNT_CREDENTIAL }}" | base64 -d > service_account_key.json
  
      - name: Run Docker container
        run: |
           docker run \
             --env MASTER_SHEET_ID=${{ secrets.MASTER_SHEET_ID }} \
             -v $(pwd)/service_account_key.json:/app/service_account_key.json \
             ghcr.io/${{ github.repository_owner }}/profiles:latest
