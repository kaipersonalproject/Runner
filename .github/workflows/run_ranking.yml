name: Run Rankings fetch script
on:
  workflow_dispatch:
  schedule:
    - cron: "15 * * * *"
jobs:
  run:
    runs-on: ubuntu-latest
    environment: 'FranceX2'
    permissions:
      contents: read
      packages: read
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Run
        run: |
          docker run --rm ghcr.io/${{ github.repository_owner }}/rankings:latest --env MASTER_SHEET_ID="${{ secrets.MASTER_SHEET_ID }}" --env SERVICE_ACCOUNT_CREDENTIAL="${{ secrets.SERVICE_ACCOUNT_CREDENTIAL }}" 
